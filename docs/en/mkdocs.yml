INHERIT: ../../mkdocs.yml

site_url: https://handongliren.github.io/HDpip/en/
edit_uri: edit/main/docs/en/docs
site_description: Official website of HDpip
copyright: <a href="#__consent">Change Cookie Settings</a><br>Copyright &copy; 2026 Xiaokang2022, handongliren<br>The website is forked from maliang's website
docs_dir: docs
site_dir: ../../site/en/

theme:
  custom_dir: ../overrides
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/theme-light-dark
        name: System Mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Light Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: yellow
      toggle:
        icon: material/weather-night
        name: Dark Mode

extra:
  alternate:
    - name: 简体中文
      link: ../
      lang: zh
    - name: English
      link: .
      lang: en
  status:
    new: Recently added
    deprecated: Deprecated
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/handongliren/HDpip/
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/HDpip/
      name: PyPI
    - icon: fontawesome/brands/bilibili
      link: https://space.bilibili.com/498105668
      name: Bilibili
    - icon: fontawesome/solid/paper-plane
      link: mailto:1079489986@qq.com
      name: Contact the author
  consent:
    actions:
      - accept
      - reject
      - manage
    title: Cookie Consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.<br/>
      (You can still modify your cookies settings later in the bottom left
      corner of the page)
  analytics:
    provider: google
    property: G-9YC5SN4ZFD
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: Helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/emoticon-neutral-outline
          name: Just so-so
          data: 0
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: Could be improved
          data: -1
          note: Thanks for your feedback!

exclude_docs: ""

nav:
  - Home:
      - Home: index.md
      - License: LICENSE.md
      - Changelog: CHANGELOG.md
